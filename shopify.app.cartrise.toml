# Alias config — same as shopify.app.toml. Use: shopify app config use shopify.app.cartrise.toml

client_id = "7f45625bd3dd31467d8bdeb3f78"
name = "CartRaise"
application_url = "https://cart-raise.vercel.app/"
embedded = true
handle = "cartraise"

[auth]
redirect_urls = [
  "https://cart-raise.vercel.app/api/shopify/callback",
  "http://localhost:3000/api/shopify/callback",
  "http://127.0.0.1:3000/api/shopify/callback",
]

[access_scopes]
scopes = "read_products,write_products,read_orders"
use_legacy_install_flow = false

[access.admin]
direct_api_mode = "offline"

[webhooks]
api_version = "2025-10"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
compliance_topics = [
  "customers/data_request",
  "customers/redact",
  "shop/redact",
]
uri = "https://cart-raise.vercel.app/api/webhooks/shopify"

[app_preferences]
url = "https://cart-raise.vercel.app/dashboard"

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = false
